name: Publish to Scoop

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      WINGET_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example 0.3.1
        required: true
        type: string

jobs:
  scoop:
    runs-on: ubuntu-latest
    steps:
      - name: Download release asset and get hash
        id: hash
        run: |
          curl -sL "https://github.com/fanis/claude-code-switcher/releases/download/${{ inputs.version }}/claude-code-switcher.exe" -o claude-code-switcher.exe
          echo "sha256=$(sha256sum claude-code-switcher.exe | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update scoop manifest
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WINGET_TOKEN }}
          script: |
            const version = '${{ inputs.version }}';
            const hash = '${{ steps.hash.outputs.sha256 }}';
            const manifest = JSON.stringify({
              version,
              description: "Fast native Windows utility for switching between Claude Code projects.",
              homepage: "https://github.com/fanis/claude-code-switcher",
              license: {
                identifier: "PolyForm-Internal-Use-1.0.0",
                url: "https://github.com/fanis/claude-code-switcher/blob/master/LICENCE.md"
              },
              url: `https://github.com/fanis/claude-code-switcher/releases/download/${version}/claude-code-switcher.exe#/claude-code-switcher.exe`,
              hash,
              bin: "claude-code-switcher.exe",
              checkver: { github: "https://github.com/fanis/claude-code-switcher" },
              autoupdate: {
                url: "https://github.com/fanis/claude-code-switcher/releases/download/$version/claude-code-switcher.exe#/claude-code-switcher.exe"
              }
            }, null, 4) + '\n';

            const { data: file } = await github.rest.repos.getContent({
              owner: 'fanis',
              repo: 'scoop-apps',
              path: 'bucket/claude-code-switcher.json',
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: 'fanis',
              repo: 'scoop-apps',
              path: 'bucket/claude-code-switcher.json',
              message: `claude-code-switcher: Update to ${version}`,
              content: Buffer.from(manifest).toString('base64'),
              sha: file.sha,
            });
